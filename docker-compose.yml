services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: duckllo
      POSTGRES_USER: duckllo
      POSTGRES_PASSWORD: duckllo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duckllo"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgres://duckllo:duckllo@db:5432/duckllo?sslmode=disable
      DUCKLLO_ADDR: ":3000"
      DUCKLLO_UPLOADS: /app/uploads
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TAILSCALE_PREAUTH_KEY: ${TAILSCALE_PREAUTH_KEY:-}
      CONTAINER_RUNTIME: ${CONTAINER_RUNTIME:-docker}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: ["serve"]

volumes:
  pgdata:
  uploads:
